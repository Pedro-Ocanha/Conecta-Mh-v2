<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Colégio MH</title>
  <link rel="stylesheet" href="styles/login2.css">
   <link rel="shortcut icon" href="img/brasao_colegio.webp" type="image/x-icon">
</head>
<body>

  <a class="button" href="home.html"> Home </a>
  <div class="split">
    <div class="left">
      <div class="circle" style="width:240px;height:240px;top:-80px;left:-80px;"></div>
      <div class="circle" style="width:140px;height:140px;bottom:10px;right:-40px;"></div>
      <div class="circle" style="width:80px;height:80px;top:30px;right:20px;"></div>
      <div class="left-icon"></div>
      <p class="brand">Colégio MH</p>
      <p class="tagline">Sistema de Registro de Ocorrências<br>Colégio Estadual Cívico Militar<br>Profa. Maria Helena Teixeira Luciano</p>
    </div>
    <div class="right">
      <h1>Acesse sua conta</h1>
      <p class="sub">Insira seus dados para continuar</p>

      <div id="msg-erro" class="msg-erro" role="alert" style="display:none"></div>

      <div class="field">
        <label for="email">E-mail</label>
        <input id="email" type="email" placeholder="Seu e-mail" autocomplete="username">
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div class="options">
        <label class="remember">
          <input type="checkbox" id="lembrar" style="width:14px;height:14px;accent-color:#1D9E75;">
          Lembrar de mim
        </label>
        <a class="forgot" href="#">Esqueceu a senha?</a>
      </div>
      <button class="btn-login" id="btn-entrar">Entrar</button>
      <p class="signup">Novo por aqui? <a href="#">Fale com a administração</a></p>
    </div>
  </div>

  <script>
    // Verifica se já está logado e redireciona direto
    if (sessionStorage.getItem('logado') === 'true') {
      window.location.href = 'login.html';
    }

    const btn = document.getElementById('btn-entrar');
    const msgErro = document.getElementById('msg-erro');


    const USUARIOS = [
      { email: 'admin@colegiomh.edu.br', senha: '123456', nome: 'Dir. Gestão', role: 'Administrador', iniciais: 'DG' },
      { email: 'professor@colegiomh.edu.br', senha: '123456', nome: 'Prof. Carlos', role: 'Professor', iniciais: 'PC' },
    ];

    function tentarLogin() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('password').value;
      const lembrar = document.getElementById('lembrar').checked;

      msgErro.style.display = 'none';

      if (!email || !senha) {
        mostrarErro('Preencha o e-mail e a senha.');
        return;
      }

      const usuario = USUARIOS.find(u => u.email === email && u.senha === senha);

      if (!usuario) {
        mostrarErro('E-mail ou senha incorretos.');
        document.getElementById('password').value = '';
        return;
      }

      // Salva sessão
      const storage = lembrar ? localStorage : sessionStorage;
      storage.setItem('logado', 'true');
      storage.setItem('usuario', JSON.stringify({
        nome: usuario.nome,
        role: usuario.role,
        iniciais: usuario.iniciais,
        email: usuario.email
      }));

      btn.textContent = 'Entrando…';
      btn.disabled = true;

      setTimeout(() => { window.location.href = 'ocorrencias.html'; }, 600);
    }

    function mostrarErro(msg) {
      msgErro.textContent = msg;
      msgErro.style.display = 'block';
    }

    btn.addEventListener('click', tentarLogin);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') tentarLogin(); });
  </script>
</body>
</html>
